name: Publish App
run-name: ${{github.event.head_commit.message}}
on:
  push:
    tags:
      - v*
jobs:
  publish-program:
    name: "Publish program"
    runs-on: ubuntu-latest
    steps:
      - name: Get source code
        uses: actions/checkout@v7
      - name: Build images
        run: docker build -t ghcr.io/${{github.actor}}/gorutine-control:latest .
      - name: Login to ghcr.io
        run: echo -n ${{secrets.GITHUB_TOKEN}} | docker login ghcr.io --username ${{github.actor}} --password-stdin
      - name: Push image to ghcr
        run: docker push ghcr.io/${{github.actor}}/gorutine-control:latest
      - name: Install dependencies
        run: go mod tidy
      - name: Build program
        run: go build -o program main.go
      - name: Compress files images
        run: zip -r ./gorutine-control-${{ github.ref_name }}.zip ./program
      - name: Release to Github
        uses: softprops/action-gh-release@v3
        with:
          files: |
            gorutine-control-${{ github.ref_name }}.zip
 